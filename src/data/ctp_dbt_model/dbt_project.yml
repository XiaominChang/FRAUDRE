name: 'ctp_dbt_model'
version: '1.0.0'
config-version: 2

profile: 'CTP_model'

model-paths: ["models"]
analysis-paths: ["analysis"]
test-paths: ["tests"]
seed-paths: ["data"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_modules"

vars:
  claim_start_date: '2021-01-01' 
  claim_end_date: '2025-05-01'
  start_date: '2021-01-01' 
  end_date: '2025-05-01'

models:
  ctp_dbt_model:
    materialized: table
    config:
      grants:
        SELECT: ['uproj_fraud_analytics_huddle']

    node_models:
      materialized: table
    relationship_models:
      materialized: table
    relationship_models_exposure:
      materialized: table
